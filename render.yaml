services:
  - type: web
    name: iare-event-hub-backend
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: SAMVIDHA_LOGIN_URL
        value: https://samvidha.iare.ac.in/pages/login/checkUser.php
      - key: SAMVIDHA_PROFILE_URL
        value: https://samvidha.iare.ac.in/home?action=profile
      - key: SAMVIDHA_REQUEST_TIMEOUT_SECONDS
        value: 15
      - key: ALLOW_DEV_AUTH_HEADERS
        value: false
      - key: JWT_AUDIENCE
        value: authenticated
      - key: CORS_ORIGINS
        sync: false
